# ─── Foot Terminal — ThatThingOS Theme ───────────────────────────────
# ~/.config/foot/foot.ini

[main]
font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes
pad=8x8

[colors]
# Deep black background, neon cyan/purple accent
alpha=0.92
background=0a0a0f
foreground=c8d3f5

regular0=1a1a2e   # black
regular1=ff2d55   # red
regular2=00ff88   # green
regular3=ffcc00   # yellow
regular4=0099ff   # blue
regular5=bf5af2   # magenta
regular6=00ffcc   # cyan
regular7=c8d3f5   # white

bright0=555577
bright1=ff6b81
bright2=44ff99
bright3=ffd60a
bright4=40b8ff
bright5=da8fff
bright6=66ffee
bright7=ffffff

# Selection
selection-foreground=0a0a0f
selection-background=00ffcc

# URL underline
url=00ffcc

[cursor]
style=block
color=00ffcc 0a0a0f
blink=yes

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000

[key-bindings]
spawn-terminal=Mod+Return
search-start=Mod+/
